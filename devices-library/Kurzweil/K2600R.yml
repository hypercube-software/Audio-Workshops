#
# Do NOT edit this file, create a <device-name>-user.yml in the same directory instead
#
brand: "Kurzweil"
deviceName: "K2600R"
presetFormat: BANK_MSB_LSB_PRG
presetNaming: STANDARD
macros:
  - "Request(command,body)   : ---   : F0 07 00 78 command body F7"
  - "DIR(type,id)            : ---   : Request($04,type id)"
  - "DIR_PROGRAM(id)         : ---   : DIR($0104,id)"
  - "PatchName()             : ---   : DIR_PROGRAM(kobjId) : PatchMapper"

#
# Kurzweil did a giant mess mixing MIDI bank concept and object ids
# Everything is mixed-up
#
deviceModes:
  Program:
    midiChannels: 0-15
    queryName: PatchName()
    banks:
      "Bank 0":
        command: "0000"
        presetDomain: "1-100"
      "Bank 1":
        command: "0001"
        presetDomain: "1-100"
      "Bank 2":
        command: "0002"
        presetDomain: "1-100"
      "Bank 3":
        command: "0003"
        presetDomain: "1-100"
      "Bank 4":
        command: "0004"
        presetDomain: "1-100"
      "Bank 5":
        command: "0005"
        presetDomain: "1-100"
      "Bank 6":
        command: "0006"
        presetDomain: "1-100"
      "Bank 7":
        command: "0007"
        presetDomain: "1-100"
      "Bank 8":
        command: "0008"
        presetDomain: "1-100"
      "Bank 9":
        command: "0009"
        presetDomain: "1-100"

#
# Mappers to extract patch names
#
mappers:
  PatchMapper:
    fields:
      name:
        type: KURZWEIL_STRING
        offset: $0D
        size: 15

controllers:
  - "01   | Modulation  | CC           | 0 | 127"
  - "0B   | Expression  | CC           | 0 | 127"
  - "40   | Sustain     | CC           | 0 | 127"
