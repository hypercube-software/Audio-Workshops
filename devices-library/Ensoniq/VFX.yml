#
# Do NOT edit this file, create a <device-name>-user.yml in the same directory instead
#
deviceName: "VFX"
brand: "Ensoniq"
presetFormat: NO_BANK_PRG
presetNaming: STANDARD
macros:
  - "PatchName()             :       : F0 0F 05 00 00 00 00 05 F7 : ProgramMapper"

decodingKey:
  start: 6
  end: 1
  key:
    - 0 0 0 0 A7 A6 A5 A4
    - 0 0 0 0 A3 A2 A1 A0
    - 0 0 0 0 B7 B6 B5 B4
    - 0 0 0 0 B3 B2 B1 B0
    - 0 0 0 0 C7 C6 C5 C4
    - 0 0 0 0 C3 C2 C1 C0
    - 0 0 0 0 D7 D6 D5 D4
    - 0 0 0 0 D3 D2 D1 D0
    - 0 0 0 0 E7 E6 E5 E4
    - 0 0 0 0 E3 E2 E1 E0
    - 0 0 0 0 F7 F6 F5 F4
    - 0 0 0 0 F3 F2 F1 F0
    - 0 0 0 0 G7 G6 G5 G4
    - 0 0 0 0 G3 G2 G1 G0

deviceModes:
  Single:
    midiChannels: 0
    queryName: PatchName()
    banks:
      "Factory Bank":
        presetDomain: 0-59

#
# Mappers to extract patch names
#
mappers:
  ProgramMapper:
    fields:
      name:
        type: STRING
        offset: $01F2
        size: 11

controllers:
  - "01                    | Modulation     | CC    | 0 | 127"
  - "0B                    | Expression     | CC    | 0 | 127"
  - "40                    | Sustain        | CC    | 0 | 127"
