#
# Do NOT edit this file, create a <device-name>-user.yml in the same directory instead
#
deviceName: "Virus Classic"
brand: "Access"
presetFormat: BANK_MSB_LSB_PRG
presetNaming: STANDARD
checksum: AccessVirusChecksum
macros:
  - "Single Request(bank,program) : 10B : F0 00203301 00 30 bank program F7"
  - "Multi Request(bank,program)  : 10B : F0 00203301 00 31 bank program F7"
  - "Single Edit Buffer()         : --- : Single Request($00,$40)"
  - "Multi Edit Buffer()          : --- : Multi Request($00,$00)"
  - "Single Bank Request(bank)    : --- : F0 00203301 00 32 bank F7"
  - "Multi Bank Request(bank)     : --- : F0 00203301 00 33 bank F7"
  - "Arrangement Request()        : --- : F0 00203301 00 34 F7"
  - "Global Request()             : --- : F0 00203301 00 35 F7"
  - "Total Request()              : --- : F0 00203301 00 36 F7"
  - "PatchName()                  : --- : Single Edit Buffer() : SingleMapper"
  - "MultiName()                  : --- : Multi Edit Buffer() : MultiMapper"
  - "setParam(page,param,part,value)   : F0 00203301 00 7 page part param value F7"
  - "setAParam(part,param,value)       : setParam($0,part,param,value)"
  - "setBParam(part,param,value)       : setParam($1,part,param,value)"
  - "setCParam(part,param,value)       : setParam($2,part,param,value)"
  - "setGlobalCParam(param,value)      : setCParam(param,$00,value)"
  - "setSingleAParam(param,value)      : setAParam(param,$40,value)"
  - "setSingleBParam(param,value)      : setBParam(param,$40,value)"
  - "setSingleCParam(param,value)      : setCParam(param,$40,value)"
  - "setPlayMode(value)                : setGlobalCParam(122,value)"
  - "setSingleMode()                   : setPlayMode($00);setGlobalChannel(0);enableProgramChange()"
  - "setMultiMode()                    : setPlayMode($02);setGlobalChannel(15);enableProgramChange();enableMultiProgramChange()"
  - "setMultiSingleMode()              : setPlayMode($01)"
  - "enableProgramChange()             : setGlobalCParam(85,$01)"
  - "enableMultiProgramChange()        : setGlobalCParam(86,$01)"
  - "setGlobalChannel(ch)              : setGlobalCParam(124,ch)"
  - "selectMulti(prg)                  : CF program" # work if setGlobalChannel(15) and enableMultiProgramChange()
  - "setCutOff1(value)                 : setSingleAParam(40,value)"
  - "setCutOff2(value)                 : setSingleAParam(41,value)"
  - "setReso1(value)                   : setSingleAParam(42,value)"
  - "setReso2(value)                   : setSingleAParam(43,value)"
  - "setFilterAttack(value)            : setSingleAParam(54,value)"
  - "setFilterDecay(value)             : setSingleAParam(55,value)"
  - "setFilterSustain(value)           : setSingleAParam(56,value)"
  - "setFilterSustainTime(value)       : setSingleAParam(57,value)"
  - "setFilterRelease(value)           : setSingleAParam(58,value)"
  - "setAmpAttack(value)               : setSingleAParam(59,value)"
  - "setAmpDecay(value)                : setSingleAParam(60,value)"
  - "setAmpSustain(value)              : setSingleAParam(61,value)"
  - "setAmpSustainTime(value)          : setSingleAParam(62,value)"
  - "setAmpRelease(value)              : setSingleAParam(63,value)"
  - "setReverbDecay(value)             : setSingleAParam(116,value)"
  - "setEffectSend(value)              : setSingleAParam(113,value)"
deviceModes:
  Single:
    command: setSingleMode()
    queryName: PatchName()
    backupCommand: Single Edit Buffer()
    midiChannels: 0
    banks:
      "Bank A (RAM)":
        command: 0000
        presetDomain: 0-127
      "Bank B (RAM)":
        command: 0001
        presetDomain: 0-127
      "Bank C":
        command: 0002
        presetDomain: 0-127
      "Bank D":
        command: 0003
        presetDomain: 0-127
      "Bank E":
        command: 0004
        presetDomain: 0-127
      "Bank F":
        command: 0005
        presetDomain: 0-127
      "Bank G":
        command: 0006
        presetDomain: 0-127
      "Bank H":
        command: 0007
        presetDomain: 0-127
    categories:
      - "None"
      - "Lead"
      - "Bass"
      - "Pad"
      - "Decay"
      - "Pluck" # called 'Plug' in manual, but in Virus C manual it is 'Pluck'
      - "Acid"
      - "Classic"
      - "Arpeggiator"
      - "Effects"
      - "Drums"
      - "Percussion"
      - "Input"
      - "Vocoder"
      - "Favourite 1"
      - "Favourite 2"
      - "Favourite 3"
  Multi:
    command: setMultiMode()
    queryName: MultiName()
    backupCommand: Multi Edit Buffer()
    midiChannels: 15
    subBanks:
      midiChannels: 0-14
      fromMode: Single
    banks:
      "Factory Bank":
        command: 0000
        channel: 16
        presetDomain: 0-127

#
# Mappers to extract patch names
#
mappers:
  SingleMapper:
    fields:
      name:
        type: STRING
        offset: $F9
        size: 10
      category:
        type: CATEGORY
        offset: $104
        size: 1
  MultiMapper:
    fields:
      name:
        type: STRING
        offset: $0D
        size: 10

patchOverrides:
  - name: SingleName
    mode: Single
    condition:
      offset: $06
      value: 10
    overrides:
      - offset: $07
        value: $00    # enforce edit buffer
      - offset: $F9
        size: 10
        type: STRING
        value: $PatchName
      - offset: $109
        value: CK260 # Checksum
  - name: MultiName
    mode: Multi
    condition:
      offset: $06
      value: 11
    overrides:
      - offset: $07
        value: $00 # enforce edit buffer
      - offset: $0D
        size: 10
        type: STRING
        value: $PatchName
      - offset: $109
        value: CK260 # Checksum
controllers:
  - "01                    | Modulation     | CC    | 0 | 127"
  - "0B                    | Expression     | CC    | 0 | 127"
  - "40                    | Sustain        | CC    | 0 | 127"
  - "setCutOff1(lsb)       |  Filter Freq   | SYSEX | 0 | 127"
  - "setReso1(lsb)         |  Filter Res    | SYSEX | 0 | 127"
  - "setAmpAttack(lsb)     |  VCA Attack    | SYSEX | 0 | 127"
  - "setAmpDecay(lsb)      |  VCA Decay     | SYSEX | 0 | 127"
  - "setAmpSustain(lsb)    |  VCA Sustain   | SYSEX | 0 | 127"
  - "setAmpRelease(lsb)    |  VCA Release   | SYSEX | 0 | 127"
  - "setFilterAttack(lsb)  |  VCF Attack    | SYSEX | 0 | 127"
  - "setFilterDecay(lsb)   |  VCF Decay     | SYSEX | 0 | 127"
  - "setFilterSustain(lsb) |  VCF Sustain   | SYSEX | 0 | 127"
  - "setFilterRelease(lsb) |  VCF Release   | SYSEX | 0 | 127"
  - "setReverbDecay(lsb)   |  Reverb Time   | SYSEX | 0 | 127"
  - "setEffectSend(lsb)    |  Reverb Level  | SYSEX | 0 | 127"
