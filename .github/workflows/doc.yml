name: Documentation build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Set permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the in-progress run and the latest.
# We do NOT cancel in-progress runs to ensure production deployments complete successfully.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install Typst CLI to make it available for the Maven build
      - name: Setup Typst
        uses: typst-community/setup-typst@v3
        with:
          version: "0.12.0"

      # 2. Setup Java, required to run Maven
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Build the book using Maven
      # This compiles the Typst source located in 'books/src/main/typst' 
      # and generates the PDF in the target folder
      - name: Build book with Maven
        run: mvn clean package -f books/pom.xml

      # 4. Copy the generated PDF to the site's documentation folder
      # This makes the PDF accessible via the static site generated by Docsify
      - name: Copy book to site docs
        run: cp books/target/kurzweil-format.pdf site/docs/kurzweil-format.pdf

      # 5. Setup Node.js for the Docsify site build
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'site/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./site

      - name: Build site
        run: npm run build --if-present
        working-directory: ./site

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site/docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
